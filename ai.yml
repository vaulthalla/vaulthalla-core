profiles:
  openai-cheap:
    provider: openai

    default_max_output_tokens:
      emergency_triage: 4000
      triage: 3500
      draft: 2800
      polish: 2400
      release_notes: 4000

    stages:
      emergency_triage:
        model: gpt-5-nano
        reasoning_effort: low
      triage:
        model: gpt-5-nano
        reasoning_effort: low
      draft:
        model: gpt-5-nano
        reasoning_effort: low
        structured_mode: strict_json_schema
      polish:
        model: gpt-5-mini
        reasoning_effort: low
      release_notes:
        model: gpt-5-mini
        reasoning_effort: low

  openai-balanced:
    provider: openai

    default_max_output_tokens:
      triage: 3000
      draft: 5000
      polish: 4000

    stages:
      triage:
        model: gpt-5-nano
        reasoning_effort: low
      draft:
        model: gpt-5-mini
        reasoning_effort: medium
        structured_mode: strict_json_schema
      polish:
        model: gpt-5.4
        reasoning_effort: medium

  openai-premium:
    provider: openai

    default_max_output_tokens:
      triage: 8000
      draft: 12000
      polish: 10000

    stages:
      triage:
        model: gpt-5-nano
        reasoning_effort: low
      draft:
        model: gpt-5-mini
        reasoning_effort: medium
        structured_mode: strict_json_schema
      polish:
        model: gpt-5.4
        reasoning_effort: high

  openai-premium-deep-triage:
    provider: openai

    default_max_output_tokens:
      triage: 9000
      draft: 12000
      polish: 10000
      release_notes: 25000

    stages:
      triage:
        model: gpt-5-nano
        reasoning_effort: medium
      draft:
        model: gpt-5-mini
        reasoning_effort: medium
        structured_mode: strict_json_schema
      polish:
        model: gpt-5.4
        reasoning_effort: high
      release_notes:
        model: gpt-5.4
        reasoning_effort: high

  gemma-solo-stable:
    provider: openai-compatible
    base_url: http://127.0.0.1:8888/v1

    default_temperature:
      triage: 0
      draft: 0.2
      polish: 0

    default_max_output_tokens:
      triage:
        mode: dynamic_ratio
        ratio: 0.12
        min: 200
        max: 700
      draft:
        mode: dynamic_ratio
        ratio: 0.35
        min: 800
        max: 3200
      polish:
        mode: dynamic_ratio
        ratio: 0.2
        min: 400
        max: 1200

    stages:
      triage:
        model: Gemma-4-31B-it-JANG_4M
        reasoning_effort: low

      draft:
        model: Gemma-4-31B-it-JANG_4M
        reasoning_effort: medium
        structured_mode: strict_json_schema

      polish:
        model: Gemma-4-31B-it-JANG_4M
        reasoning_effort: high

  qwen36-8bit-solo:
    provider: openai-compatible
    base_url: http://127.0.0.1:8888/v1

    default_temperature:
      triage: 0
      draft: 0.15
      polish: 0

    default_max_output_tokens:
      triage:
        mode: dynamic_ratio
        ratio: 0.12
        min: 200
        max: 700
      draft:
        mode: dynamic_ratio
        ratio: 0.32
        min: 900
        max: 3400
      polish:
        mode: dynamic_ratio
        ratio: 0.18
        min: 450
        max: 1200

    stages:
      triage:
        model: Qwen3.6-35B-A3B-8bit
        reasoning_effort: low

      draft:
        model: Qwen3.6-35B-A3B-8bit
        reasoning_effort: medium
        structured_mode: strict_json_schema

      polish:
        model: Qwen3.6-35B-A3B-8bit
        reasoning_effort: high

  gemma-qwen36-8bit-hybrid:
    provider: openai-compatible
    base_url: http://127.0.0.1:8888/v1

    default_temperature:
      triage: 0
      draft: 0.1
      polish: 0

    default_max_output_tokens:
      triage:
        mode: dynamic_ratio
        ratio: 0.10
        min: 200
        max: 500
      draft:
        mode: dynamic_ratio
        ratio: 0.30
        min: 900
        max: 3000
      polish:
        mode: dynamic_ratio
        ratio: 0.14
        min: 300
        max: 800

    stages:
      triage:
        model: Gemma-4-31B-it-JANG_4M
        reasoning_effort: low

      draft:
        model: Qwen3.6-35B-A3B-8bit
        reasoning_effort: medium
        structured_mode: strict_json_schema

      polish:
        model: Gemma-4-31B-it-JANG_4M
        reasoning_effort: high
