name: Release Pipeline

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Validate, Package, and Publish Artifacts
    runs-on:
      - self-hosted
      - Linux
      - X64
      - ubuntu-latest-lts
    environment: Production
    env:
      RELEASE_AI_MODE: ${{ vars.RELEASE_AI_MODE || 'auto' }}
      RELEASE_AI_PROFILE_OPENAI: ${{ vars.RELEASE_AI_PROFILE_OPENAI || 'openai-balanced' }}
      RELEASE_LOCAL_LLM_ENABLED: ${{ vars.RELEASE_LOCAL_LLM_ENABLED || 'false' }}
      RELEASE_LOCAL_LLM_PROFILE: ${{ vars.RELEASE_LOCAL_LLM_PROFILE || '' }}
      RELEASE_LOCAL_LLM_BASE_URL: ${{ vars.RELEASE_LOCAL_LLM_BASE_URL || '' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
      RELEASE_LOCAL_LLM_API_KEY: ${{ secrets.RELEASE_LOCAL_LLM_API_KEY || '' }}
      RELEASE_DEBIAN_DISTRIBUTION: ${{ vars.RELEASE_DEBIAN_DISTRIBUTION || '' }}
      RELEASE_DEBIAN_URGENCY: ${{ vars.RELEASE_DEBIAN_URGENCY || '' }}
      RELEASE_PUBLISH_MODE: ${{ vars.RELEASE_PUBLISH_MODE || 'disabled' }}
      RELEASE_PUBLISH_REQUIRED: ${{ vars.RELEASE_PUBLISH_REQUIRED || 'auto' }}
      NEXUS_REPO_URL: ${{ vars.NEXUS_REPO_URL || '' }}
      NEXUS_USER: ${{ secrets.NEXUS_USER || '' }}
      NEXUS_PASS: ${{ secrets.NEXUS_PASS || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OS packages required for Python venv
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v apt-get >/dev/null 2>&1; then
            echo "::error::Expected apt-based runner for venv provisioning."
            exit 1
          fi
          APT_PREFIX=""
          if command -v sudo >/dev/null 2>&1; then
            APT_PREFIX="sudo"
          fi
          ${APT_PREFIX} apt-get update
          if apt-cache show python3.12-venv >/dev/null 2>&1; then
            ${APT_PREFIX} apt-get install -y python3.12-venv
            echo "RELEASE_VENV_OS_PACKAGE=python3.12-venv" >> "$GITHUB_ENV"
          elif apt-cache show python3-venv >/dev/null 2>&1; then
            ${APT_PREFIX} apt-get install -y python3-venv
            echo "RELEASE_VENV_OS_PACKAGE=python3-venv" >> "$GITHUB_ENV"
          else
            echo "::error::Could not find python3.12-venv or python3-venv packages."
            exit 1
          fi

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create release-tooling venv and install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m venv --copies .venv
          if [ ! -x ".venv/bin/python" ]; then
            echo "::error::Venv creation failed; missing executable: ${GITHUB_WORKSPACE}/.venv/bin/python"
            ls -la .venv || true
            ls -la .venv/bin || true
            exit 1
          fi
          .venv/bin/python --version
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt
          RELEASE_PYTHON_PATH="${GITHUB_WORKSPACE}/.venv/bin/python"
          if [ ! -x "${RELEASE_PYTHON_PATH}" ]; then
            echo "::error::Resolved RELEASE_PYTHON path is not executable: ${RELEASE_PYTHON_PATH}"
            exit 1
          fi
          echo "RELEASE_PYTHON=${RELEASE_PYTHON_PATH}" >> "$GITHUB_ENV"

      - name: Verify release-tooling interpreter and SDK imports
        shell: bash
        run: |
          set -euo pipefail
          echo "Using OS venv package: ${RELEASE_VENV_OS_PACKAGE:-<unset>}"
          if [ -z "${RELEASE_PYTHON:-}" ]; then
            echo "::error::RELEASE_PYTHON is empty."
            exit 1
          fi
          if [ ! -x "${RELEASE_PYTHON}" ]; then
            echo "::error::RELEASE_PYTHON does not exist or is not executable: ${RELEASE_PYTHON}"
            ls -la "${GITHUB_WORKSPACE}/.venv" || true
            ls -la "${GITHUB_WORKSPACE}/.venv/bin" || true
            exit 1
          fi
          "${RELEASE_PYTHON}" --version
          "${RELEASE_PYTHON}" -m pip --version
          "${RELEASE_PYTHON}" -c "import openai"

      - name: Validate release state
        shell: bash
        run: |
          "${RELEASE_PYTHON}" -m tools.release check

      - name: Build core
        uses: ./.github/actions/build

      - name: Run core tests
        uses: ./.github/actions/test

      - name: Verify release-tooling interpreter path before release stages
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_PYTHON:-}" ]; then
            echo "::error::RELEASE_PYTHON is empty before release-tooling tests."
            exit 1
          fi
          if [ ! -x "${RELEASE_PYTHON}" ]; then
            echo "::error::RELEASE_PYTHON became invalid before release-tooling tests: ${RELEASE_PYTHON}"
            ls -la "${GITHUB_WORKSPACE}/.venv" || true
            ls -la "${GITHUB_WORKSPACE}/.venv/bin" || true
            exit 1
          fi
          "${RELEASE_PYTHON}" --version
          "${RELEASE_PYTHON}" -m pip --version

      - name: Run release tooling tests
        shell: bash
        run: |
          "${RELEASE_PYTHON}" -m unittest discover -s tools/release/tests -p 'test_*.py'

      - name: Setup web toolchain
        uses: ./.github/actions/setup_web

      - name: Build web (includes private icon sync)
        uses: ./.github/actions/build_web

      - name: Run web checks
        uses: ./.github/actions/test_web

      - name: Build release artifacts (Debian + web deployable)
        id: package
        uses: ./.github/actions/package
        with:
          output_dir: release
          python_executable: ${{ env.RELEASE_PYTHON }}

      - name: Verify release artifact directory before upload
        shell: bash
        run: |
          set -euo pipefail
          artifact_dir="${{ steps.package.outputs.artifact_dir }}"
          if [ -z "$artifact_dir" ]; then
            echo "::error::Package action did not return artifact_dir output."
            exit 1
          fi
          if [ ! -d "$artifact_dir" ]; then
            echo "::error::artifact_dir does not exist: $artifact_dir"
            exit 1
          fi
          echo "Artifact directory: $artifact_dir"
          echo "Staged files:"
          find "$artifact_dir" -maxdepth 2 -type f | sort

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vaulthalla-release-${{ github.ref_name }}
          path: ${{ steps.package.outputs.artifact_dir }}
          if-no-files-found: error

      - name: Resolve publication policy (optional vs required)
        id: publish_policy
        shell: bash
        run: |
          set -euo pipefail
          ref="${GITHUB_REF:-}"
          is_tag="false"
          if [[ "$ref" == refs/tags/* ]]; then
            is_tag="true"
          fi

          raw_required="${RELEASE_PUBLISH_REQUIRED:-auto}"
          case "$raw_required" in
            auto)
              if [ "$is_tag" = "true" ]; then
                required="true"
              else
                required="false"
              fi
              ;;
            true|false)
              required="$raw_required"
              ;;
            *)
              echo "::error::Invalid RELEASE_PUBLISH_REQUIRED value: ${raw_required}. Expected auto|true|false."
              exit 1
              ;;
          esac

          echo "[publish-policy] github.ref=${ref}"
          echo "[publish-policy] is_tag_release=${is_tag}"
          echo "[publish-policy] RELEASE_PUBLISH_REQUIRED=${raw_required}"
          if [ "$required" = "true" ]; then
            echo "[publish-policy] publication requirement: MANDATORY for this run"
          else
            echo "[publish-policy] publication requirement: OPTIONAL for this run"
          fi

          echo "required=${required}" >> "$GITHUB_OUTPUT"

      - name: Publish Debian packages to Nexus
        shell: bash
        run: |
          set -euo pipefail
          artifact_dir="${{ steps.package.outputs.artifact_dir }}"
          required="${{ steps.publish_policy.outputs.required }}"
          if [ "$required" = "true" ]; then
            echo "[publish] publication requirement: MANDATORY"
          else
            echo "[publish] publication requirement: OPTIONAL"
          fi
          echo "[publish] RELEASE_PUBLISH_MODE=${RELEASE_PUBLISH_MODE:-disabled}"
          if [ -n "${NEXUS_REPO_URL:-}" ]; then
            echo "[publish] NEXUS_REPO_URL configured: ${NEXUS_REPO_URL}"
          else
            echo "[publish] NEXUS_REPO_URL configured: no"
          fi
          if [ -n "${NEXUS_USER:-}" ]; then
            echo "[publish] NEXUS_USER configured: yes"
          else
            echo "[publish] NEXUS_USER configured: no"
          fi
          if [ -n "${NEXUS_PASS:-}" ]; then
            echo "[publish] NEXUS_PASS configured: yes"
          else
            echo "[publish] NEXUS_PASS configured: no"
          fi

          publish_args=(--output-dir "$artifact_dir")
          if [ "$required" = "true" ]; then
            publish_args+=(--require-enabled)
          fi

          if ! "${RELEASE_PYTHON}" -m tools.release publish-deb "${publish_args[@]}"; then
            echo "::error::Debian publication stage failed. Review publication logs for configuration, artifact selection, and upload diagnostics."
            exit 1
          fi

      - name: Prepare GitHub release asset list (deduped)
        if: startsWith(github.ref, 'refs/tags/')
        id: gh_release_assets
        shell: bash
        run: |
          set -euo pipefail
          artifact_dir="${{ steps.package.outputs.artifact_dir }}"
          if [ -z "$artifact_dir" ] || [ ! -d "$artifact_dir" ]; then
            echo "::error::Cannot prepare GitHub release assets; artifact_dir is missing: $artifact_dir"
            exit 1
          fi

          mapfile -t release_assets < <(find "$artifact_dir" -type f | LC_ALL=C sort -u)
          if [ "${#release_assets[@]}" -eq 0 ]; then
            echo "::error::No files found for GitHub release asset attachment under $artifact_dir"
            exit 1
          fi

          echo "[gh-release] deduped asset count: ${#release_assets[@]}"
          echo "[gh-release] assets:"
          printf '%s\n' "${release_assets[@]}"

          {
            echo "assets<<EOF"
            printf '%s\n' "${release_assets[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Attach artifacts to GitHub Release (tag only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.gh_release_assets.outputs.assets }}
          fail_on_unmatched_files: true
          overwrite_files: true

      - name: Sync GitHub Release body from generated release_notes.md
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/github-script@v7
        env:
          RELEASE_NOTES_PATH: ${{ steps.package.outputs.artifact_dir }}/release_notes.md
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('node:fs');

            const notesPath = process.env.RELEASE_NOTES_PATH;
            if (!notesPath) {
              core.setFailed('RELEASE_NOTES_PATH is empty; package artifact_dir output was not resolved.');
              return;
            }
            if (!fs.existsSync(notesPath)) {
              core.setFailed(`Generated release notes artifact is missing: ${notesPath}`);
              return;
            }

            const body = fs.readFileSync(notesPath, 'utf8');
            if (!body.trim()) {
              core.setFailed(`Generated release notes artifact is empty: ${notesPath}`);
              return;
            }

            const tag = context.ref.replace('refs/tags/', '');
            if (!tag || tag === context.ref) {
              core.setFailed(`Unable to resolve tag from ref: ${context.ref}`);
              return;
            }

            let release;
            try {
              release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
            } catch (error) {
              core.setFailed(`No matching GitHub Release exists for tag ${tag}: ${error.message}`);
              return;
            }

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              tag_name: tag,
              name: tag,
              body,
            });

            core.info(`Updated GitHub Release ${release.data.id} for tag ${tag} from ${notesPath}.`);
