profiles:
  gemma-solo-stable:
    provider: openai-compatible
    base_url: http://127.0.0.1:8888/v1

    default_temperature:
      triage: 0
      draft: 0.2
      polish: 0

    default_max_output_tokens:
      triage:
        mode: dynamic_ratio
        ratio: 0.12
        min: 200
        max: 700
      draft:
        mode: dynamic_ratio
        ratio: 0.35
        min: 800
        max: 3200
      polish:
        mode: dynamic_ratio
        ratio: 0.2
        min: 400
        max: 1200

    stages:
      triage:
        model: Gemma-4-31B-it-JANG_4M
        reasoning_effort: low

      draft:
        model: Gemma-4-31B-it-JANG_4M
