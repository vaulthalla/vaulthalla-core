name: Modular CI/CD Pipeline
description: Unified action to control which CI/CD jobs run via input flags.

inputs:
  build:
    description: Run the build step
    default: 'true'
    required: false
  test:
    description: Run the test step
    default: 'false'
    required: false
  build_web:
    description: Run the web build step
    default: 'false'
    required: false
  test_web:
    description: Run the web test step
    default: 'false'
    required: false
  package:
    description: Run the package step
    default: 'false'
    required: false
  release:
    description: If true, auto-runs package and deploy
    default: 'false'
    required: false

runs:
  using: composite
  steps:
    - name: Build
      if: ${{ inputs.build == 'true' }}
      uses: ./.github/actions/build
      with:
        build_type: ${{ (inputs.package == 'true' || inputs.release == 'true') && 'release' || 'debug' }}

    - name: Test
      if: ${{ inputs.test == 'true' }}
      uses: ./.github/actions/test

    - name: Setup Web
      if: ${{ inputs.build_web == 'true' || inputs.test_web == 'true' }}
      uses: ./.github/actions/setup_web

    - name: Build Web
      if: ${{ inputs.build_web == 'true' }}
      uses: ./.github/actions/build_web

    - name: Test Web
      if: ${{ inputs.test_web == 'true' }}
      uses: ./.github/actions/test_web

    - name: Package
      if: ${{ inputs.package == 'true' || inputs.release == 'true' }}
      uses: ./.github/actions/package
